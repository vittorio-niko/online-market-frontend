openapi: 3.0.3
info:
  title: Order Service API (User)
  description: API for order management available to regular users and guests (GET /items is public)
  version: 1.0.0
servers:
  - url: http://market.local
    description: Local development server

paths:
  /user/items:
    get:
      tags:
        - User Items
      summary: Get items with filtering and pagination
      description: Public endpoint - accessible even without authentication
      operationId: getItemsPublic
      parameters:
        - name: name
          in: query
          description: Filter by item name (partial match)
          schema:
            type: string
            maxLength: 255
        - name: minPrice
          in: query
          description: Minimum price filter
          schema:
            type: number
            format: decimal
            minimum: 0
        - name: maxPrice
          in: query
          description: Maximum price filter
          schema:
            type: number
            format: decimal
            minimum: 0
        - name: deleted
          in: query
          description: Filter by deleted status
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number (starting from 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: Sorting parameters (e.g., "price,desc")
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageItemSummaryResponseDto'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /user/items/{id}:
    get:
      tags:
        - User Items
      summary: Get item details by ID
      operationId: getItemById
      parameters:
        - name: id
          in: path
          required: true
          description: Item ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSummaryResponseDto'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: RESOURCE_NOT_FOUND
                message: Item with id 123 not found
                fieldErrors: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /user/orders/prepaid:
    post:
      tags:
        - User Orders
      summary: Create a prepaid order (requires payment)
      operationId: createPrepaidOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrepaidOrderRequestDto'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummaryResponseDto'
        '400':
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ARGUMENT
                message: Validation failed
                fieldErrors:
                  paymentId: "must not be blank"
                  orderItemsDto: "must not be empty"
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: JWT_AUTHENTICATION_FAILURE
                message: Full authentication is required to access this resource
                fieldErrors: null
        '409':
          description: Payment conflict (payment already processed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: PAYMENT_CONFLICT
                message: Payment with id 'pay_123' has already been processed
                fieldErrors: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /user/orders/cash-on-delivery:
    post:
      tags:
        - User Orders
      summary: Create a cash-on-delivery order (pay upon delivery)
      operationId: createCashOnDeliveryOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCashOnDeliveryOrderRequestDto'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummaryResponseDto'
        '400':
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /user/orders:
    get:
      tags:
        - User Orders
      summary: Get current user's orders with pagination
      operationId: getMyOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOrderSummaryResponseDto'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /user/orders/{id}:
    get:
      tags:
        - User Orders
      summary: Get order details with items by ID (only current user's orders)
      operationId: getOrderWithOrderItemsById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummaryWithOrderItemsResponseDto'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - order belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: FORBIDDEN
                message: Access denied. Order belongs to another user
                fieldErrors: null
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

    delete:
      tags:
        - User Orders
      summary: Soft delete current user's order
      operationId: softDeleteMyOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - order belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Modification not allowed (payment already initiated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: MODIFICATION_NOT_ALLOWED
                message: Cannot delete order after payment initiation
                fieldErrors: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /user/orders/{id}/items:
    put:
      tags:
        - User Orders
      summary: Update items in current user's order
      operationId: updateOrderItemsByOrderId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateOrderItemRequestDto'
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '400':
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - order belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Modification not allowed (payment already initiated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: MODIFICATION_NOT_ALLOWED
                message: Cannot modify order after payment initiation
                fieldErrors: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /user/orders/{orderId}/pay:
    post:
      tags:
        - User Orders
      summary: Initiate payment for an order (user action)
      operationId: triggerOrderPayment
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitPaymentRequestDto'
      responses:
        '202':
          description: Payment initiation accepted
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - order belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Payment conflict (order already paid or processing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: PAYMENT_CONFLICT
                message: Order 123 is already paid or payment is in progress
                fieldErrors: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

components:
  schemas:
    ItemSummaryResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
          format: decimal

    OrderSummaryResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        deliveryStatus:
          type: string
          enum: [PROCESSING, SHIPPED, DELIVERED, COMPLETED]
        paymentStatus:
          type: string
          enum: [INITIAL, PENDING, PAID, FAILED]
        totalPrice:
          type: number
          format: decimal

    OrderResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        deliveryStatus:
          type: string
          enum: [PROCESSING, SHIPPED, DELIVERED, COMPLETED]
        paymentStatus:
          type: string
          enum: [INITIAL, PENDING, PAID, FAILED]
        totalPrice:
          type: number
          format: decimal
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderSummaryWithOrderItemsResponseDto:
      allOf:
        - $ref: '#/components/schemas/OrderSummaryResponseDto'
        - type: object
          properties:
            orderItems:
              type: array
              items:
                $ref: '#/components/schemas/OrderItemSummaryResponseDto'

    OrderItemSummaryResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        itemId:
          type: integer
          format: int64
        itemName:
          type: string
        itemPrice:
          type: number
          format: decimal
        quantity:
          type: integer

    OrderItemResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        itemId:
          type: integer
          format: int64
        itemName:
          type: string
        itemPrice:
          type: number
          format: decimal
        quantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePrepaidOrderRequestDto:
      type: object
      required:
        - paymentId
        - orderItemsDto
      properties:
        paymentId:
          type: string
          description: Payment ID from payment service
        orderItemsDto:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequestDto'

    CreateCashOnDeliveryOrderRequestDto:
      type: object
      required:
        - orderItemsDto
      properties:
        orderItemsDto:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequestDto'

    CreateOrderItemRequestDto:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1

    UpdateOrderItemRequestDto:
      type: object
      required:
        - id
        - quantity
      properties:
        id:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1

    InitPaymentRequestDto:
      type: object
      required:
        - paymentId
      properties:
        paymentId:
          type: string

    PageItemSummaryResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ItemSummaryResponseDto'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
        totalPages:
          type: integer
        totalElements:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        sort:
          type: object
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    PageOrderSummaryResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummaryResponseDto'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
        totalPages:
          type: integer
        totalElements:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        sort:
          type: object
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    ErrorResponse:
      type: object
      description: Standard error response format used across all endpoints
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - RESOURCE_NOT_FOUND
            - BAD_BUSINESS_REQUEST
            - ITEM_CONFLICT
            - PAYMENT_CONFLICT
            - MODIFICATION_NOT_ALLOWED
            - JWT_AUTHENTICATION_FAILURE
            - INVALID_ARGUMENT
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL_ERROR
          example: INVALID_ARGUMENT
        message:
          type: string
          description: Human-readable error description
          example: Validation failed
        fieldErrors:
          type: object
          description: Map of field names to validation error messages (only for validation errors)
          additionalProperties:
            type: string
          nullable: true
          example:
            paymentId: "must not be blank"
            quantity: "must be at least 1"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication