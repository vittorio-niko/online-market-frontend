openapi: 3.0.3
info:
  title: Order Service API (Admin)
  description: API for managing orders and items with ADMIN role privileges
  version: 1.0.0
servers:
  - url: http://market.local
    description: Local development server

paths:
  /admin/items:
    post:
      tags:
        - Admin Items
      summary: Create a new item
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequestDto'
      responses:
        '201':
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseDto'
        '400':
          description: Invalid request (validation failed or bad business request)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Item already exists (conflict)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

    get:
      tags:
        - Admin Items
      summary: Get all items with filtering and pagination
      operationId: getItemsAdmin
      parameters:
        - name: name
          in: query
          schema:
            type: string
            maxLength: 255
        - name: minPrice
          in: query
          schema:
            type: number
            format: decimal
            minimum: 0
        - name: maxPrice
          in: query
          schema:
            type: number
            format: decimal
            minimum: 0
        - name: deleted
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageItemResponseDto'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /admin/items/{id}:
    put:
      tags:
        - Admin Items
      summary: Update an existing item
      operationId: updateItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequestDto'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseDto'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

    delete:
      tags:
        - Admin Items
      summary: Soft delete an item
      operationId: deleteItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /admin/orders:
    get:
      tags:
        - Admin Orders
      summary: Get all orders with filtering and pagination
      operationId: getOrders
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
        - name: deliveryStatus
          in: query
          schema:
            type: string
            enum: [PENDING, SHIPPED, DELIVERED, CANCELLED]
        - name: paymentStatus
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, FAILED, REFUNDED]
        - name: deleted
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOrderResponseDto'
        '400':
          description: Invalid filter or pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /admin/orders/{id}:
    get:
      tags:
        - Admin Orders
      summary: Get order details with items by ID
      operationId: getOrderWithOrderItemsByIdAdmin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderWithOrderItemsResponseDto'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

    delete:
      tags:
        - Admin Orders
      summary: Soft delete an order
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Order deleted successfully
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /admin/orders/{id}/delivery-status:
    patch:
      tags:
        - Admin Orders
      summary: Update order delivery status
      operationId: updateOrderDeliveryStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: deliveryStatus
          in: query
          required: true
          schema:
            type: string
            enum: [PENDING, SHIPPED, DELIVERED, CANCELLED]
      responses:
        '204':
          description: Delivery status updated successfully
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

  /admin/orders/{orderId}/pay:
    post:
      tags:
        - Admin Orders
      summary: Manually initiate payment for an order (admin action)
      operationId: triggerOrderPaymentAdmin
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitPaymentRequestDto'
      responses:
        '202':
          description: Payment initiation accepted
        '400':
          description: Invalid request (malformed JSON or validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - missing or invalid JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden (ADMIN role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Payment conflict (order already paid or processing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []

components:
  schemas:
    CreateItemRequestDto:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        price:
          type: number
          format: decimal
          minimum: 0.01

    UpdateItemRequestDto:
      type: object
      required:
        - price
      properties:
        price:
          type: number
          format: decimal
          minimum: 0.01

    FilterItemRequestDto:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        minPrice:
          type: number
          format: decimal
          minimum: 0
        maxPrice:
          type: number
          format: decimal
          minimum: 0
        deleted:
          type: boolean

    FilterOrderRequestDto:
      type: object
      properties:
        userId:
          type: string
          maxLength: 255
        deliveryStatus:
          type: string
          enum: [PROCESSING, SHIPPED, DELIVERED, COMPLETED]
        paymentStatus:
          type: string
          enum: [INITIAL, PENDING, PAID, FAILED]
        deleted:
          type: boolean

    InitPaymentRequestDto:
      type: object
      required:
        - paymentId
      properties:
        paymentId:
          type: string

    ItemResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
          format: decimal
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        deliveryStatus:
          type: string
          enum: [PROCESSING, SHIPPED, DELIVERED, COMPLETED]
        paymentStatus:
          type: string
          enum: [INITIAL, PENDING, PAID, FAILED]
        totalPrice:
          type: number
          format: decimal
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderWithOrderItemsResponseDto:
      allOf:
        - $ref: '#/components/schemas/OrderResponseDto'
        - type: object
          properties:
            orderItems:
              type: array
              items:
                $ref: '#/components/schemas/OrderItemResponseDto'

    OrderItemResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        itemId:
          type: integer
          format: int64
        itemName:
          type: string
        itemPrice:
          type: number
          format: decimal
        quantity:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PageItemResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ItemResponseDto'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
        totalPages:
          type: integer
        totalElements:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        sort:
          type: object
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    PageOrderResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponseDto'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
        totalPages:
          type: integer
        totalElements:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        sort:
          type: object
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    ErrorResponse:
      type: object
      description: Standard error response format used across all endpoints
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - RESOURCE_NOT_FOUND
            - BAD_BUSINESS_REQUEST
            - ITEM_CONFLICT
            - PAYMENT_CONFLICT
            - MODIFICATION_NOT_ALLOWED
            - JWT_AUTHENTICATION_FAILURE
            - INVALID_ARGUMENT
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL_ERROR
          example: INVALID_ARGUMENT
        message:
          type: string
          description: Human-readable error description
          example: Validation failed
        fieldErrors:
          type: object
          description: Map of field names to validation error messages (only for validation errors)
          additionalProperties:
            type: string
          nullable: true

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token authentication (ADMIN role required)